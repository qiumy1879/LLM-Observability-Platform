version: "3.8"

services:
  db:
    image: postgres:15
    container_name: llm_obs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llmobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmobs_secret}
      POSTGRES_DB: ${POSTGRES_DB:-llm_observability}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmobs} -d ${POSTGRES_DB:-llm_observability}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
